trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '22.x'

steps:

# Checkout
- checkout: self
  clean: true

# Install Node.js
- task: NodeTool@0
  displayName: 'Install Node.js'
  inputs:
    versionSpec: '$(nodeVersion)'

# Install dependencies
- script: |
    npm install
  workingDirectory: 'CrackJobUI'
  displayName: 'Install NPM Packages'

# Build React
- script: |
    npm run build
  workingDirectory: 'CrackJobUI'
  displayName: 'Build React Application'

# Deploy to Azure VM
- task: SSH@0
  displayName: 'Deploy React Docker Container'
  inputs:
    sshEndpoint: 'AzureVM-SSH'
    runOptions: 'inline'
    readyTimeout: '20000'
    inline: |
      set -e

      echo "Moving to UI repository..."
      cd /home/kkmail2027/git-source/UI-code

      git reset --hard HEAD
      git clean -fd

      echo "Pulling latest code..."
      git pull

      cd CrackJobUI

      echo "Building Docker image..."
      docker build -t crackjobs-ui:latest .

      echo "Stopping old container..."
      docker stop crackjobs-ui || true

      echo "Removing old container..."
      docker rm crackjobs-ui || true

      echo "Starting new container..."
      docker run -d \
        --name crackjobs-ui \
        --restart unless-stopped \
        -p 3000:80 \
        crackjobs-ui:latest

      echo "Waiting for container..."
      sleep 10

      echo "Checking UI..."
      curl -fsS http://localhost:3000

      echo ""
      echo "React Deployment Successful"