trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '22.x'

steps:

#---------------------------------------
# Checkout
#---------------------------------------
- checkout: self
  clean: true

#---------------------------------------
# Install Node.js
#---------------------------------------
- task: NodeTool@0
  displayName: 'Install Node.js'
  inputs:
    versionSpec: '$(nodeVersion)'

#---------------------------------------
# Install Dependencies
#---------------------------------------
- script: |
    npm install
  displayName: 'Install NPM Packages'

#---------------------------------------
# Build React
#---------------------------------------
- script: |
    npm run build
  displayName: 'Build React Application'

#---------------------------------------
# Deploy to Azure VM
#---------------------------------------
- task: SSH@0
  displayName: 'Deploy React Docker Container'
  inputs:
    sshEndpoint: 'AzureVM-SSH'
    runOptions: 'inline'
    readyTimeout: '20000'
    inline: |

      set -e

      echo "========================================"
      echo "Moving to React repository"
      echo "========================================"

      cd /home/kkmail2027/git-source/UI-code/CrackJobUI

      echo "========================================"
      echo "Reset Local Repository"
      echo "========================================"

      git reset --hard HEAD
      git clean -fd

      echo "========================================"
      echo "Pull Latest Code"
      echo "========================================"

      git pull

      echo "========================================"
      echo "Build Docker Image"
      echo "========================================"

      docker build -t crackjobs-ui:latest .

      echo "========================================"
      echo "Stop Existing Container"
      echo "========================================"

      docker stop crackjobs-ui || true

      echo "========================================"
      echo "Remove Existing Container"
      echo "========================================"

      docker rm crackjobs-ui || true

      echo "========================================"
      echo "Run New Container"
      echo "========================================"

      docker run -d \
        --name crackjobs-ui \
        --restart unless-stopped \
        -p 3000:80 \
        crackjobs-ui:latest

      echo "Waiting for application..."
      sleep 15

      echo "========================================"
      echo "Running Containers"
      echo "========================================"

      docker ps

      echo "========================================"
      echo "Health Check"
      echo "========================================"

      curl -fsS http://localhost:3000 > /dev/null

      echo ""
      echo "========================================"
      echo "React Deployment Successful"
      echo "========================================"